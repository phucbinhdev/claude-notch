name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test
        run: ./scripts/test.sh all

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: build/test/TestResults.xcresult
